version: "2.4"

services:
  app:
    build: .
    network_mode: host
    volumes:
      - app-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/collected_company.db
      - LOG_LEVEL=INFO
    # Security: isolate from host
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW
    pids_limit: 100
    mem_limit: 512m
    tmpfs:
      - /tmp:size=64M

volumes:
  app-data:
