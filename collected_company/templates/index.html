<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collected Company - MTG Singles Price Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-2xl md:text-4xl font-bold text-gray-100 mb-2">Collected Company</h1>
            <p class="text-gray-400">Shop locally for MtG Singles here in Phoenix</p>
        </header>

        <!-- Search Form -->
        <div class="bg-gray-800 rounded-lg shadow-md p-6 mb-6">
            <form id="search-form" class="space-y-4">
                <div>
                    <label for="card-search" class="block text-sm font-medium text-gray-300 mb-2">
                        Search for a card:
                    </label>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input
                            type="text"
                            id="card-search"
                            name="q"
                            required
                            placeholder="e.g., Lightning Bolt"
                            class="flex-1 px-4 py-2 bg-gray-700 border border-gray-600 text-gray-100 placeholder-gray-400 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            autocomplete="off"
                        />
                        <button
                            type="submit"
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-800"
                        >
                            Search
                        </button>
                    </div>
                    <!-- Autocomplete dropdown will go here -->
                    <div id="autocomplete-results" class="hidden mt-2 bg-gray-700 border border-gray-600 rounded-lg shadow-lg max-h-60 overflow-y-auto"></div>
                </div>
            </form>
        </div>

        <!-- Progress Bar -->
        <div id="loading-container" class="hidden mb-4">
            <div class="bg-gray-700 rounded-full h-2.5 mb-2">
                <div id="progress-bar" class="bg-blue-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="text-sm text-gray-400">Searching stores...</p>
        </div>

        <!-- Completion Message -->
        <div id="completion-message" class="hidden text-green-400 font-semibold mb-4"></div>

        <!-- Main content: Sidebar + Results -->
        <div id="main-content" class="flex flex-col md:flex-row gap-6">
            <!-- Sidebar: Store/Location Filters + Card Preview -->
            <aside id="filter-sidebar" class="w-full md:w-48 flex-shrink-0">
                <div class="md:sticky md:top-4 space-y-4 md:max-h-[calc(100vh-2rem)] md:overflow-y-auto">
                    <div class="bg-gray-800 rounded-lg shadow-md p-4">
                        <button id="store-filter-toggle" class="flex items-center justify-between w-full text-sm font-semibold text-gray-300 uppercase tracking-wider" onclick="document.getElementById('store-filters').classList.toggle('hidden'); this.querySelector('.toggle-arrow').classList.toggle('rotate-90')">
                            <span>Filter by Store</span>
                            <span class="toggle-arrow text-gray-400 transition-transform duration-200">&#9654;</span>
                        </button>
                        <div id="store-filters" class="hidden space-y-3 mt-3">
                            <!-- Populated dynamically -->
                        </div>
                    </div>

                    <!-- Card Header (populated dynamically) -->
                    <div id="card-header" class="hidden bg-gray-800 rounded-lg shadow-md p-4">
                        <img id="card-image" src="" alt="" class="w-full rounded-lg shadow-sm mb-2" />
                        <h2 id="card-name" class="text-sm font-bold text-gray-100 mb-1"></h2>
                        <a id="card-scryfall-link" href="" target="_blank" class="text-xs text-blue-400 hover:underline">
                            View on Scryfall →
                        </a>
                    </div>
                </div>
            </aside>

            <!-- Results Table -->
            <div id="results-container" class="hidden flex-1 bg-gray-800 rounded-lg shadow-md overflow-hidden">
                <div class="p-4 border-b border-gray-700">
                    <div class="flex gap-4 items-center">
                        <div>
                            <label for="sort-select" class="text-sm font-medium text-gray-300 mr-2">Sort by:</label>
                            <select id="sort-select" class="px-3 py-1 bg-gray-700 border border-gray-600 text-gray-100 rounded">
                                <option value="price">Price (Low to High)</option>
                                <option value="price-desc">Price (High to Low)</option>
                                <option value="store">Store Name</option>
                                <option value="condition">Condition</option>
                            </select>
                        </div>
                        <span id="filter-count" class="text-sm text-gray-400"></span>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-700">
                        <thead class="bg-gray-750">
                            <tr>
                                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Store</th>
                                <th class="hidden md:table-cell px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Set</th>
                                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Price</th>
                                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider"><span class="md:hidden">Cond</span><span class="hidden md:inline">Condition</span></th>
                                <th class="hidden md:table-cell px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Foil</th>
                                <th class="hidden md:table-cell px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Stock</th>
                                <th class="hidden md:table-cell px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Link</th>
                            </tr>
                        </thead>
                        <tbody id="results-tbody" class="divide-y divide-gray-700">
                            <!-- Results populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Error Messages -->
        <div id="error-container" class="hidden mt-4 p-4 bg-red-900/50 border border-red-700 rounded-lg">
            <p class="text-red-300" id="error-message"></p>
        </div>
    </div>

    <!-- Mobile card preview FAB + modal -->
    <button id="card-preview-fab" class="hidden fixed bottom-4 right-4 z-40 md:hidden bg-blue-600 text-white px-4 py-3 rounded-full shadow-lg text-sm font-medium">
        View Card
    </button>

    <div id="card-preview-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/70 p-6">
        <div class="bg-gray-800 rounded-lg p-4 max-w-xs mx-auto" onclick="event.stopPropagation()">
            <img id="card-image-modal" src="" alt="" class="w-full rounded-lg shadow-sm mb-2" />
            <h2 id="card-name-modal" class="text-sm font-bold text-gray-100 mb-1"></h2>
            <a id="card-scryfall-link-modal" href="" target="_blank" class="text-xs text-blue-400 hover:underline">
                View on Scryfall →
            </a>
            <button class="mt-3 w-full py-2 bg-gray-700 text-gray-300 rounded text-sm" onclick="document.getElementById('card-preview-modal').classList.add('hidden'); document.getElementById('card-preview-modal').classList.remove('flex')">Close</button>
        </div>
    </div>

    <footer class="mt-8 text-center text-gray-500 text-sm">
        <a href="https://github.com/altf4/collected-company" target="_blank" rel="noopener noreferrer" class="hover:text-gray-300 transition-colors">
            Source Code on GitHub
        </a>
    </footer>

    <style>
        /* Highlight animation for new results */
        @keyframes highlight {
            0% { background-color: rgba(59, 130, 246, 0.15); }
            100% { background-color: transparent; }
        }

        .new-result-highlight {
            animation: highlight 1s ease-out;
        }
    </style>

    <script src="/static/js/search.js?v=7"></script>
</body>
</html>
